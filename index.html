<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login Access</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-size:cover;
background-position:center;
background-repeat:no-repeat;
color:white;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(2,6,23,0.85);
z-index:0;
}

.container{
width:380px;
background:#020617;
border-radius:20px;
padding:30px;
box-shadow:0 0 40px rgba(0,0,0,0.7);
position:relative;
z-index:1;
}

.banner{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
text-align:center;
margin-bottom:25px;
}

.banner h2{
margin:0;
font-size:22px;
}

.banner p{
margin:6px 0 0 0;
font-size:14px;
opacity:0.8;
}

label{
font-size:14px;
opacity:0.9;
}

input{
width:95%;
max-width:340px;
display:block;
margin:8px auto 18px auto;
padding:14px;
border-radius:12px;
border:1px solid #1e3a8a;
background:#020617;
color:white;
font-size:14px;
outline:none;
}

input:focus{
border:1px solid #3b82f6;
box-shadow:0 0 10px #1d4ed8;
}

button{
width:100%;
height:50px;
display:flex;
align-items:center;
justify-content:center;
gap:8px;

border:none;
border-radius:12px;

background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;

font-size:15px;
font-weight:500;

cursor:pointer;
transition:all .25s ease;

box-shadow:0 6px 15px rgba(37,99,235,0.35);
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(37,99,235,0.45);
}

button:active{
transform:scale(0.97);
}

.error{
color:#ef4444;
font-size:14px;
text-align:center;
margin-bottom:15px;
display:none;
background:rgba(239,68,68,0.1);
padding:8px;
border-radius:8px;
border:1px solid #ef4444;
}

.footer{
text-align:center;
margin-top:35px;
font-size:13px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

<div class="banner">
<h2>Welcome - Someone</h2>
<p>Login Access - Script nythera</p>
</div>

<label>Username :</label>
<input type="text" id="username" placeholder="Masukkan Username">

<label>Password :</label>
<input type="password" id="password" placeholder="Masukkan Password">

<p id="errorMsg" class="error"></p>

<button onclick="login()">
<span>➜</span>
<span>Login</span>
</button>

<div class="footer">
<p>Nythera Special Access</p>
<p>this page is protected by login access.</p>
</div>

</div>

<script>

// BACKGROUND GAMBAR (BISA DIGANTI LINK)
const bgImage = "https://files.catbox.moe/2o1sq0.jpg";
document.body.style.backgroundImage = `url(${bgImage})`;

async function login(){

let user = document.getElementById("username").value
let pass = document.getElementById("password").value
let error = document.getElementById("errorMsg")

const url = "https://raw.githubusercontent.com/umam989/webaddtoken/main/users.json"

let res = await fetch(url)
let data = await res.json()

let valid = data.users.find(
u => u.username === user && u.password === pass
)

if(valid){

localStorage.setItem("login","true")
window.location.href="index.html"

}else{

error.style.display="block"
error.innerText="Username atau Password salah!"

}

}

</script>

</body>
</html>
